[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA-fallback: alla rutter serverar index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker ska aldrig cachas av CDN så uppdateringar slår igenom
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
